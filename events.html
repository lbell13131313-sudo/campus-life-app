<!DOCTYPE html>
<html lang="en">
    <!--the home page for the college-->
    <head>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link rel="stylesheet" href ="/css/style.css">
    </head>
    
    <body>
        <!--Header that is used in all 3 pages for unity-->
        <header id="top">
            <!--used flex row to get the two images to be on the same line-->
            <div class="flex-row text-center">
                <!--Home button picture returns the user to home.html-->
                <button id="home-btn" class="btn">
                    <img src="/images/whitehome.png" alt="Home Page Button" width="20%">
                </button>
                <!--<a href="home.html"><img src="/images/whitehome.png" alt="Home Page Button" width="5%"></a>-->
                <img src="/images/centenarylogo.jpeg" alt="Centenary University Logo" width="15%">
            </div>
        </header>

        <!--Information on upcoming campus events-->
        <main>
            <h1>Campus Events</h1>

            <div class="row">
                <!--Making use of the grid system to get the spacing exactly as I would like it to be-->
                <section class="col-md-6 mb-2">
                    <img src="/images/cyclonecon.jpg" alt="cafeteria staff serving food to students" width="50%">
                </section>

                <section class="col-md-6 mb-2">
                    <img src="/images/centenarystagecompany.jpg" alt="cafeteria staff serving food to students" width="64.5%">
                </section>
            </div>

            <h4>Upcoming Events!</h4>

            <ul style="text-align: center; list-style-position: inside;">
                <!--Currently just placeholders until the final version-->
                <li>Event 1</li>
                <li>Event 2</li>
                <li>Event 3</li>
            </ul>
        </main>

        <footer>
            <h2>HOPE TO SEE YOU THERE!!!</h2>
        </footer>

        <script src = "/js/script.js"></script>
    </body>
</html>
